# version: "3.9"

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
    container_name: ${PROJECT_NAME:-cakephp5}_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./src:/var/www/html
      - composer_cache:/root/.composer/cache
    environment:
      TZ: "America/Mexico_City"
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      SECURITY_SALT: ${SECURITY_SALT:-__SALT__}
      DATABASE_URL: "mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db/${MYSQL_DATABASE}?encoding=utf8mb4&timezone=UTC&cacheMetadata=true"
      CACHE_DEFAULT_URL: "redis://redis:6379/0"
      CACHE_CAKECORE_URL: "redis://redis:6379/1"
      CACHE_CAKEMODEL_URL: "redis://redis:6379/2"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cakephp_network

  db:
    image: mysql:8.0
    container_name: ${PROJECT_NAME:-cakephp5}_db
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cakephp5}
      MYSQL_USER: ${MYSQL_USER:-cakephp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cakephp}
      TZ: "America/Mexico_City"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cakephp_network

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-cakephp5}_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - cakephp_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ${PROJECT_NAME:-cakephp5}_pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      UPLOAD_LIMIT: 512M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cakephp_network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ${PROJECT_NAME:-cakephp5}_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cakephp_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  composer_cache:
    driver: local

networks:
  cakephp_network:
    driver: bridge